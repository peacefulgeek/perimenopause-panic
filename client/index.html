<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FAF5EE" />
    <meta
      name="description"
      content="The honest, non-patronizing guide to perimenopause that starts in your late 30s. Evidence-based, warm, and clear writing on the hormonal decade nobody warned you about." />
    <!-- Default head: SSR middleware in server/siteRoutes.ts injects
         page-specific <title>, canonical, og/twitter, robots, and JSON-LD
         immediately before </head>. The fallbacks below are only for
         non-SSR previews (e.g. the file:// shell or an unhandled route). -->
    <title>Perimenopause Panic — The Oracle Lover</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fonts: served from Bunny CDN as WOFF2; system serif fallback ensures
         readability if the CDN isn't yet seeded. NO Google Fonts. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="https://perimenopause.b-cdn.net/fonts/cormorant-garamond-700.woff2"
      crossorigin />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="https://perimenopause.b-cdn.net/fonts/nunito-sans-400.woff2"
      crossorigin />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="https://perimenopause.b-cdn.net/fonts/inter-500.woff2"
      crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
</html>
